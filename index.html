<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study With AI - 모바일 공부 RPG</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 모바일 앱 감성을 위한 터치 스크롤바 숨김 및 애니메이션 정의 */
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn { animation: fadeIn 0.25s ease-out forwards; }
        .animate-scaleUp { animation: scaleUp 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. 초기 상숫값 정의
        // ==========================================
        const INITIAL_STATS = {
            level: 1, exp: 0, maxExp: 100, hp: 100, focus: 10, willpower: 10, knowledge: 10,
        };

        const INITIAL_STATE = {
            isInitialized: false,
            step: 0,
            userInfo: null,
            avatar: null,
            stats: INITIAL_STATS,
            todos: [],
            wrongNotes: [],
            totalStudyTime: 0,
            currentTab: 'home',
        };

        // ==========================================
        // 2. 미니 아바타 그래픽 렌더러 컴포넌트
        // ==========================================
        function MiniAvatarRenderer({ config }) {
            const getClothColor = () => {
                switch (config.clothStyle) {
                    case 'student': return 'bg-blue-600';
                    case 'developer': return 'bg-zinc-800';
                    case 'engineer': return 'bg-amber-600';
                    case 'expert': return 'bg-slate-900 border-t-2 border-yellow-400';
                    default: return 'bg-emerald-500';
                }
            };
            return (
                <div class="w-full h-full flex flex-col items-center justify-center scale-110 relative pt-2">
                    <div class="absolute top-4 w-12 text-center text-xs font-bold z-20 text-stone-700">
                        {config.gender === 'male' ? '👨‍🦱' : '👩‍🦰'}
                    </div>
                    <div class="w-10 h-10 rounded-full shadow-inner relative z-10 flex flex-col items-center justify-center" style={{ backgroundColor: config.skinColor }}>
                        <div class="flex gap-2 justify-center mb-0.5 mt-2">
                            <span class="text-[7px] text-stone-800">●</span>
                            <span class="text-[7px] text-stone-800">●</span>
                        </div>
                        <div class="text-[8px] -mt-1 font-bold text-rose-600">
                            {config.expression === 'happy' && '⩊'}
                            {config.expression === 'focused' && '⌣'}
                            {config.expression === 'tired' && '~'}
                        </div>
                    </div>
                    <div class={`w-14 h-12 rounded-t-2xl ${getClothColor()} z-0 -mt-2 shadow-md flex items-center justify-center`}>
                        <span class="text-[7px] text-white/50 font-mono tracking-tighter scale-75 pt-2">
                            {config.clothStyle.toUpperCase()}
                        </span>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. 온보딩 화면 컴포넌트 (STEP 0 ~ 4)
        // ==========================================
        function Onboarding({ step, setStep, onComplete }) {
            const [name, setName] = useState('');
            const [nickname, setNickname] = useState('');
            const [purpose, setPurpose] = useState('자격증 취득');
            const [field, setField] = useState('전기');
            const [examDate, setExamDate] = useState('');
            const [goal, setGoal] = useState('');
            const [level, setLevel] = useState('초급');
            const [dailyTime, setDailyTime] = useState('1시간');

            const [gender, setGender] = useState('male');
            const [skinColor, setSkinColor] = useState('#FFD1A9');
            const [hairStyle, setHairStyle] = useState('짧은 머리');

            const handleFinish = () => {
                const userInfo = { name, nickname, purpose, field, examDate, goal, level, dailyTime };
                const avatar = { gender, skinColor, eyeShape: '둥근 눈', expression: 'happy', hairStyle, clothStyle: 'hoodie' };
                onComplete(userInfo, avatar);
            };

            if (step === 0) {
                return (
                    <div class="flex justify-center bg-gray-50 min-h-screen items-center p-4">
                        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-gray-100 flex flex-col items-center text-center">
                            <div class="text-5xl mb-4 animate-bounce">🌱</div>
                            <h1 class="text-2xl font-bold text-gray-800 mb-1">Study With AI</h1>
                            <p class="text-sm font-semibold text-emerald-600 mb-6">AI와 함께 성장하는 나만의 공부 습관</p>
                            <div class="bg-emerald-50 p-4 rounded-xl text-sm text-gray-600 leading-relaxed mb-8">
                                AI 친구 스티(STDY)와 함께 개인 맞춤형 공부 계획을 만들고 나만의 아바타를 성장시켜보세요.
                            </div>
                            <button onClick={() => setStep(1)} class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl transition-all shadow-md text-base">
                                시작하기
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div class="flex justify-center bg-gray-50 min-h-screen items-center p-4">
                    <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">STEP {step} / 4</span>
                            <div class="w-2/3 bg-gray-200 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-emerald-500 h-full transition-all duration-300" style={{ width: `${(step / 4) * 100}%` }}></div>
                            </div>
                        </div>

                        {step === 1 && (
                            <div class="space-y-4">
                                <h2 class="text-xl font-bold text-gray-800">사용자 정보 입력</h2>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">이름</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="홍길동" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">닉네임</label>
                                    <input type="text" value={nickname} onChange={e => setNickname(e.target.value)} placeholder="공부마스터" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">공부 목적</label>
                                    <select value={purpose} onChange={e => setPurpose(e.target.value)} class="w-full p-3 border border-gray-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                        {['자격증 취득', '학교 시험 준비', '취업 준비', '영어 공부', '자기계발'].map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-1">
                                <h2 class="text-xl font-bold text-gray-800">공부 분야 선택</h2>
                                <div class="font-semibold text-sm text-gray-700 border-b pb-1">⚡ 자격증 분야</div>
                                <div class="grid grid-cols-2 gap-2">
                                    {['전기', '전자', '전자캐드', '반도체 설비 보전', '컴퓨터활용능력', '한국사'].map(f => (
                                        <button key={f} onClick={() => setField(f)} class={`p-3 text-sm rounded-xl border text-left transition-all ${field === f ? 'border-emerald-500 bg-emerald-50 font-bold text-emerald-700' : 'border-gray-200 text-gray-600'}`}>{f}</button>
                                    ))}
                                </div>
                                <div class="font-semibold text-sm text-gray-700 border-b pb-1 pt-2">🇺🇸 어학 분야</div>
                                <div class="grid grid-cols-2 gap-2">
                                    {['TOEIC', 'OPIC'].map(f => (
                                        <button key={f} onClick={() => setField(f)} class={`p-3 text-sm rounded-xl border text-left transition-all ${field === f ? 'border-emerald-500 bg-emerald-50 font-bold text-emerald-700' : 'border-gray-200 text-gray-600'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div class="space-y-4">
                                <h2 class="text-xl font-bold text-gray-800">목표 설정</h2>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">시험 날짜</label>
                                    <input type="date" value={examDate} onChange={e => setTarget(e.target.value)} class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none" />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">한 줄 목표</label>
                                    <input type="text" value={goal} onChange={e => setGoal(e.target.value)} placeholder="예: 전기기능사 합격!" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none" />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">하루 공부 시간</label>
                                    <div class="grid grid-cols-2 gap-2">
                                        {['30분', '1시간', '2시간', '3시간 이상'].map(t => (
                                            <button key={t} onClick={() => setDailyTime(t)} class={`p-2.5 text-sm rounded-xl border ${dailyTime === t ? 'border-emerald-500 bg-emerald-50 font-bold text-emerald-700' : 'border-gray-200'}`}>{t}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div class="space-y-4">
                                <h2 class="text-xl font-bold text-gray-800">나만의 미니 아바타 생성</h2>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">성별 선택</label>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button onClick={() => setGender('male')} class={`p-3 rounded-xl border ${gender === 'male' ? 'border-emerald-500 bg-emerald-50 font-bold' : 'border-gray-100'}`}>👨 남자 캐릭터</button>
                                        <button onClick={() => setGender('female')} class={`p-3 rounded-xl border ${gender === 'female' ? 'border-emerald-500 bg-emerald-50 font-bold' : 'border-gray-100'}`}>👩 여자 캐릭터</button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 mb-1">피부 톤</label>
                                    <div class="flex gap-3">
                                        {['#FFD1A9', '#FCD0A1', '#E0A96D'].map(c => (
                                            <button key={c} onClick={() => setSkinColor(c)} class={`w-8 h-8 rounded-full border-2 ${skinColor === c ? 'border-emerald-500 scale-110' : 'border-transparent'}`} style={{ backgroundColor: c }} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        <div class="flex gap-3 mt-8">
                            {step > 1 && (
                                <button onClick={() => setStep(step - 1)} class="w-1/3 bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl">이전</button>
                            )}
                            {step < 4 ? (
                                <button onClick={() => setStep(step + 1)} class="flex-1 bg-emerald-500 text-white font-semibold py-3 rounded-xl">다음 단계</button>
                            ) : (
                                <button onClick={handleFinish} class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-md">완성 및 시작 🚀</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. 홈 뷰 컴포넌체
        // ==========================================
        function HomeView({ state, toggleTodo }) {
            const completedCount = state.todos.filter(t => t.completed).length;
            const progressPercent = state.todos.length ? Math.round((completedCount / state.todos.length) * 100) : 0;

            return (
                <div class="space-y-5 animate-fadeIn">
                    <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-4 rounded-2xl border border-emerald-100 flex items-start gap-3 shadow-sm">
                        <div class="bg-white p-2 rounded-full border border-emerald-200 text-2xl shrink-0">🤖</div>
                        <div>
                            <h4 class="font-bold text-xs text-emerald-800 mb-0.5">AI 코치 스티(STDY)</h4>
                            <p class="text-xs text-gray-700 leading-relaxed">
                                {state.stats.hp < 40 
                                    ? "스티 코치: 연속된 오답으로 캐릭터가 지쳤어요! 무리하지 말고 복습 위주로 달려보아요! ☕"
                                    : `안녕하세요! 저는 스티(STDY)예요 🌱 오늘 목표인 [${state.userInfo?.goal}]을(를) 완수하기 위해 RPG 퀘스트를 클리어해 볼까요?`}
                            </p>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                        <div class="w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center border relative overflow-hidden">
                            {state.avatar && <MiniAvatarRenderer config={state.avatar} />}
                        </div>
                        <div class="flex-1 space-y-1.5">
                            <div class="flex justify-between items-end">
                                <span class="font-bold text-sm text-gray-800">Lv.{state.stats.level} {state.userInfo?.nickname}</span>
                                <span class="text-[10px] text-gray-400">EXP {state.stats.exp}/{state.stats.maxExp}</span>
                            </div>
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-emerald-500 h-full" style={{ width: `${(state.stats.exp / state.stats.maxExp) * 100}%` }}></div>
                            </div>
                            <div class="flex justify-between items-center text-xs text-gray-600 pt-1">
                                <span>❤️ 체력 {state.stats.hp}/100</span>
                                <span class="text-emerald-600 font-semibold">공부: {state.totalStudyTime}분</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-3">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-sm text-gray-800">오늘 퀘스트 진행률</h3>
                            <span class="text-xs font-bold text-emerald-600">{progressPercent}%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
                        </div>
                        <div class="pt-1 space-y-2">
                            {state.todos.slice(0, 3).map(todo => (
                                <div key={todo.id} onClick={() => toggleTodo(todo.id)} class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer">
                                    <input type="checkbox" checked={todo.completed} readOnly class="text-emerald-600 w-4 h-4" />
                                    <span class={`text-xs ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'}`}>{todo.text}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 5. 플래너 뷰 컴포넌트
        // ==========================================
        function PlannerView({ todos, addTodo, deleteTodo, toggleTodo }) {
            const [text, setText] = useState('');
            return (
                <div class="space-y-4 animate-fadeIn">
                    <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100 text-[11px] text-emerald-800">
                        🤖 <b>스티의 플래너 제안:</b> 가용 공부 시간을 계산하여 처방된 자동 일일 미션 루틴 리스트입니다.
                    </div>
                    <form onSubmit={e => { e.preventDefault(); if(text.trim()) { addTodo(text.trim()); setText(''); } }} class="flex gap-2">
                        <input type="text" value={text} onChange={e => setText(e.target.value)} placeholder="직접 공부 퀘스트 추가하기..." class="flex-1 p-2.5 text-xs border rounded-xl focus:outline-none" />
                        <button type="submit" class="bg-emerald-600 text-white px-4 rounded-xl text-xs font-bold">+</button>
                    </form>
                    <div class="space-y-2">
                        {todos.map(todo => (
                            <div key={todo.id} class="flex justify-between items-center p-3 bg-white border rounded-xl shadow-sm">
                                <div onClick={() => toggleTodo(todo.id)} class="flex items-center gap-3 flex-1 cursor-pointer">
                                    <input type="checkbox" checked={todo.completed} readOnly class="text-emerald-600" />
                                    <span class={`text-xs ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700 font-medium'}`}>{todo.text}</span>
                                </div>
                                <button onClick={() => deleteTodo(todo.id)} class="text-xs text-rose-400 hover:text-rose-600 px-1">삭제</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. 집중 타이머 뷰 컴포넌트
        // ==========================================
        function TimerView({ addMinutes }) {
            const [mode, setMode] = useState('pomodoro');
            const [isRunning, setIsRunning] = useState(false);
            const [secondsLeft, setSecondsLeft] = useState(25 * 60);
            const [freeSeconds, setFreeSeconds] = useState(0);
            const intervalRef = useRef(null);

            useEffect(() => {
                clearInterval(intervalRef.current);
                setIsRunning(false);
                setSecondsLeft(25 * 60);
                setFreeSeconds(0);
            }, [mode]);

            useEffect(() => {
                if (isRunning) {
                    intervalRef.current = setInterval(() => {
                        if (mode === 'pomodoro') {
                            setSecondsLeft(prev => {
                                if (prev <= 1) {
                                    clearInterval(intervalRef.current);
                                    setIsRunning(false);
                                    addMinutes(25);
                                    alert("뽀모도로 25분 달성 완료! 캐릭터 EXP 보상이 정산됩니다.");
                                    return 25 * 60;
                                }
                                return prev - 1;
                            });
                        } else {
                            setFreeSeconds(prev => prev + 1);
                        }
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isRunning, mode]);

            const handleFreeStop = () => {
                setIsRunning(false);
                const mins = Math.floor(freeSeconds / 60);
                if (mins > 0) {
                    addMinutes(mins);
                    alert(`자유 집중 종료: 총 ${mins}분만큼 스탯이 상승했습니다.`);
                }
                setFreeSeconds(0);
            };

            const format = (total) => {
                const m = Math.floor(total / 60).toString().padStart(2, '0');
                const s = (total % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div class="space-y-6 animate-fadeIn flex flex-col items-center pt-4">
                    <div class="grid grid-cols-2 bg-gray-100 p-1 rounded-xl w-full">
                        <button onClick={() => setMode('pomodoro')} class={`py-2 text-xs font-bold rounded-lg ${mode === 'pomodoro' ? 'bg-white text-emerald-700 shadow-sm' : 'text-gray-500'}`}>뽀모도로 (25분)</button>
                        <button onClick={() => setMode('free')} class={`py-2 text-xs font-bold rounded-lg ${mode === 'free' ? 'bg-white text-emerald-700 shadow-sm' : 'text-gray-500'}`}>자유 타이머</button>
                    </div>

                    <div class="w-52 h-52 rounded-full border-[6px] border-emerald-500 flex flex-col items-center justify-center bg-white shadow-inner">
                        <span class="text-[10px] font-bold text-gray-400 mb-1">{mode.toUpperCase()}</span>
                        <div class="text-4xl font-mono font-bold text-gray-800">
                            {mode === 'pomodoro' ? format(secondsLeft) : format(freeSeconds)}
                        </div>
                    </div>

                    <div class="flex gap-3">
                        {!isRunning ? (
                            <button onClick={() => setIsRunning(true)} class="bg-emerald-600 text-white font-bold px-6 py-2.5 rounded-full text-xs shadow-md">시작</button>
                        ) : (
                            <button onClick={() => setIsRunning(false)} class="bg-amber-500 text-white font-bold px-6 py-2.5 rounded-full text-xs shadow-md">정지</button>
                        )}
                        {mode === 'free' && (
                            <button onClick={handleFreeStop} class="bg-rose-500 text-white font-bold px-6 py-2.5 rounded-full text-xs shadow-md">종료 및 정산</button>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. 오답노트 뷰 컴포넌트
        // ==========================================
        function NotesView({ wrongNotes, addWrongNote, answerQuiz }) {
            const [subject, setSubject] = useState('전기');
            const [isModal, setIsModal] = useState(false);
            const [quizMode, setQuizMode] = useState(false);
            const [qIndex, setQIndex] = useState(0);

            const [q, setQ] = useState('');
            const [ma, setMa] = useState('');
            const [ca, setCa] = useState('');
            const [re, setRe] = useState('');

            const list = wrongNotes.filter(n => n.subject === subject);
            const isQuizActive = list.length >= 25;

            const submitNote = (e) => {
                e.preventDefault();
                addWrongNote({ subject, question: q, myAnswer: ma, correctAnswer: ca, reason: re, memo: '', stars: 0, correctStreak: 0 });
                setIsModal(false); setQ(''); setMa(''); setCa(''); setRe('');
            };

            const handleQuiz = (isCorrect) => {
                const target = list[qIndex];
                answerQuiz(target.id, isCorrect);
                if (qIndex < list.length - 1) setQIndex(p => p + 1);
                else { alert("퀴즈 세션 완수!"); setQuizMode(false); setQIndex(0); }
            };

            return (
                <div class="space-y-4 animate-fadeIn">
                    <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none">
                        {['전기', '전자', '전자캐드', '반도체', '컴퓨터활용', '한국사', 'TOEIC', 'OPIC'].map(s => (
                            <button key={s} onClick={() => { setSubject(s); setQuizMode(false); }} class={`px-3 py-1.5 text-xs font-bold rounded-full shrink-0 ${subject === s ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-500'}`}>{s}</button>
                        ))}
                    </div>

                    {quizMode ? (
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 space-y-4">
                            <h4 class="text-xs font-bold text-indigo-800">🧠 AI 오답 역습 퀴즈 인스턴스</h4>
                            <div class="bg-white p-3 rounded-xl border text-xs font-bold text-gray-700">{list[qIndex]?.question}</div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onClick={() => handleQuiz(false)} class="bg-rose-500 text-white text-xs py-2.5 rounded-xl font-bold">틀렸음 ❌</button>
                                <button onClick={() => handleQuiz(true)} class="bg-emerald-600 text-white text-xs py-2.5 rounded-xl font-bold">기억남 ⭕</button>
                            </div>
                        </div>
                    ) : (
                        <>
                            <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                                <div>
                                    <h3 class="font-bold text-xs text-gray-800">{subject} 오답 데이터</h3>
                                    <p class="text-[10px] text-gray-400">오답 보유 개수: {list.length}개</p>
                                </div>
                                <button onClick={() => setIsModal(true)} class="bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold">+ 추가</button>
                            </div>

                            {isQuizActive ? (
                                <button onClick={() => setQuizMode(true)} class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white p-3 rounded-xl text-xs font-bold shadow-md">🔥 AI 복습 퀴즈 활성화됨 (시작하기)</button>
                            ) : (
                                <div class="bg-gray-50 text-gray-400 p-3 rounded-xl text-[10px] text-center border border-dashed">오답 문항이 25개 이상 누적 시 복습 AI 퀴즈 던전이 해금됩니다. ({list.length}/25)</div>
                            )}

                            <div class="space-y-3">
                                {list.map(n => (
                                    <div key={n.id} class="bg-white p-3 rounded-xl border space-y-1.5 relative shadow-sm">
                                        {n.stars >= 5 && (
                                            <div class="bg-rose-50 p-2 rounded text-[10px] text-rose-700 font-medium">⚠️ 스티: 이 문제는 자주 틀려요! 캐릭터 스탯에 패널티가 가해집니다. 다시 학습해보세요!</div>
                                        )}
                                        <div class="flex justify-between items-center"><h4 class="font-bold text-xs text-gray-800">{n.question}</h4><span class="text-xs text-amber-500">★ {n.stars}</span></div>
                                        <div class="bg-gray-50 p-2 rounded text-[11px] space-y-0.5 text-gray-600">
                                            <div><span class="font-bold text-rose-500">내 대답:</span> {n.myAnswer}</div>
                                            <div><span class="font-bold text-emerald-600">정답지:</span> {n.correctAnswer}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {isModal && (
                        <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
                            <form onSubmit={submitNote} class="bg-white w-full max-w-sm rounded-2xl p-5 space-y-3 animate-scaleUp">
                                <h3 class="font-bold text-sm text-gray-800">오답 카드 추가</h3>
                                <input type="text" placeholder="시험 문제 기술" value={q} onChange={e => setQ(e.target.value)} required class="w-full p-2 text-xs border rounded-lg" />
                                <input type="text" placeholder="내가 쓴 오답" value={ma} onChange={e => setMa(e.target.value)} required class="w-full p-2 text-xs border rounded-lg" />
                                <input type="text" placeholder="실제 정답" value={ca} onChange={e => setCa(e.target.value)} required class="w-full p-2 text-xs border rounded-lg" />
                                <textarea placeholder="틀린 원인 분석" value={re} onChange={e => setRe(e.target.value)} required class="w-full p-2 text-xs border rounded-lg h-14 resize-none" />
                                <div class="flex gap-2 pt-2"><button type="button" onClick={() => setIsModal(false)} class="w-1/3 bg-gray-100 text-xs py-2 rounded-lg">취소</button><button type="submit" class="flex-1 bg-emerald-600 text-white text-xs font-bold py-2 rounded-lg">저장</button></div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 8. 캐릭터 화면 뷰 컴포넌트
        // ==========================================
        function CharacterView({ stats, avatar, userInfo }) {
            const getTitle = (style) => {
                if (style === 'expert') return '전문가 마스터 마크 (Lv.15)';
                if (style === 'engineer') return '수석 엔지니어 팩 (Lv.10)';
                if (style === 'developer') return '시니어 개발자 기어 (Lv.5)';
                if (style === 'student') return '클래식 학생 아바타 (Lv.3)';
                return '기본 하급 훈련 후드티';
            };

            return (
                <div class="space-y-4 animate-fadeIn">
                    <div class="bg-gradient-to-b from-emerald-600 to-teal-700 rounded-2xl p-6 text-white flex flex-col items-center shadow-md">
                        <div class="w-24 h-24 bg-white/10 rounded-xl flex items-center justify-center border border-white/20 mb-3 overflow-hidden">
                            {avatar && <MiniAvatarRenderer config={avatar} />}
                        </div>
                        <h2 class="text-base font-bold">{userInfo?.nickname}</h2>
                        <span class="text-[10px] text-emerald-100 opacity-90 mt-0.5">{getTitle(avatar?.clothStyle)}</span>
                    </div>

                    <div class="bg-white p-4 rounded-xl border shadow-sm space-y-3">
                        <h3 class="text-xs font-bold text-gray-500 uppercase">RPG 스탯 시트</h3>
                        <div class="grid grid-cols-2 gap-3 text-xs">
                            <div class="bg-gray-50 p-2.5 rounded-lg border flex justify-between"><span>❤️ 캐릭터 체력</span><span class="font-bold text-rose-600">{stats.hp}/100</span></div>
                            <div class="bg-gray-50 p-2.5 rounded-lg border flex justify-between"><span>🎯 집중 지수</span><span class="font-bold text-amber-600">{stats.focus} P</span></div>
                            <div class="bg-gray-50 p-2.5 rounded-lg border flex justify-between"><span>🔥 메타 인지력</span><span class="font-bold text-indigo-600">{stats.willpower} P</span></div>
                            <div class="bg-gray-50 p-2.5 rounded-lg border flex justify-between"><span>📘 백과사전 지식</span><span class="font-bold text-emerald-600">{stats.knowledge} P</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 9. 메인 컨트롤 어플리케이션 결합
        // ==========================================
        function App() {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('study_with_ai_html_one');
                return saved ? JSON.parse(saved) : INITIAL_STATE;
            });

            useEffect(() => {
                localStorage.setItem('study_with_ai_html_one', JSON.stringify(state));
            }, [state]);

            const setStep = (step) => setState(p => ({ ...p, step }));

            const initUser = (userInfo, avatar) => {
                const mockTasks = [
                    `${userInfo.field} 이론 1단원 마스터`,
                    `회로 기출 개념 5개 무작위 분석`,
                    `단원 족보 핵심 암기 리스트업`
                ].map((t, idx) => ({ id: `todo-${Date.now()}-${idx}`, text: t, completed: false, day: 1 }));

                setState(p => ({ ...p, userInfo, avatar, isInitialized: true, todos: mockTasks, currentTab: 'home' }));
            };

            const gainExp = (amount, penalty = 0) => {
                setState(p => {
                    let newExp = p.stats.exp + amount;
                    let newLevel = p.stats.level;
                    let newMaxExp = p.stats.maxExp;

                    while (newExp >= newMaxExp) {
                        newExp -= newMaxExp;
                        newLevel += 1;
                        newMaxExp = Math.floor(newMaxExp * 1.2);
                    }

                    let currentCloth = p.avatar?.clothStyle || 'hoodie';
                    if (newLevel >= 15) currentCloth = 'expert';
                    else if (newLevel >= 10) currentCloth = 'engineer';
                    else if (newLevel >= 5) currentCloth = 'developer';
                    else if (newLevel >= 3) currentCloth = 'student';

                    return {
                        ...p,
                        avatar: p.avatar ? { ...p.avatar, clothStyle: currentCloth } : null,
                        stats: {
                            ...p.stats,
                            level: newLevel, exp: newExp, maxExp: newMaxExp,
                            hp: Math.max(0, Math.min(100, p.stats.hp - penalty)),
                            focus: p.stats.focus + 1, willpower: p.stats.willpower + 1, knowledge: p.stats.knowledge + 2
                        }
                    };
                });
            };

            const addMinutes = (m) => {
                setState(p => ({ ...p, totalStudyTime: p.totalStudyTime + m }));
                gainExp(m * 2);
            };

            const toggleTodo = (id) => {
                setState(p => {
                    const next = p.todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                    const target = p.todos.find(t => t.id === id);
                    if (target && !target.completed) setTimeout(() => gainExp(15), 30);
                    return { ...p, todos: next };
                });
            };

            const addTodo = (text) => setState(p => ({ ...p, todos: [...p.todos, { id: `todo-${Date.now()}`, text, completed: false, day: 1 }] }));
            const deleteTodo = (id) => setState(p => ({ ...p, todos: p.todos.filter(t => t.id !== id) }));

            const addWrongNote = (n) => setState(p => ({ ...p, wrongNotes: [...p.wrongNotes, { ...n, id: `n-${Date.now()}` }] }));
            
            const answerQuiz = (id, isCorrect) => {
                setState(p => {
                    let hpPenalty = 0;
                    const nextNotes = p.wrongNotes.map(n => {
                        if (n.id !== id) return n;
                        if (isCorrect) return { ...n, correctStreak: n.correctStreak + 1 };
                        else {
                            const nextStars = n.stars + 1;
                            if (nextStars >= 5) hpPenalty = 5;
                            return { ...n, stars: nextStars, correctStreak: 0 };
                        }
                    }).filter(n => n.correctStreak < 3);

                    if (isCorrect) setTimeout(() => gainExp(20), 30);
                    else if (hpPenalty > 0) setTimeout(() => gainExp(0, 5), 30);

                    return { ...p, wrongNotes: nextNotes };
                });
            };

            if (!state.isInitialized) {
                return <Onboarding step={state.step} setStep={setStep} onComplete={initUser} />;
            }

            return (
                <div class="flex justify-center min-h-screen">
                    <div class="w-full max-w-md bg-white min-h-screen flex flex-col shadow-2xl relative pb-16">
                        
                        <header class="bg-emerald-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
                            <h1 class="font-bold text-base tracking-wide">🌱 Study With AI</h1>
                            <span class="bg-emerald-700 px-3 py-0.5 rounded-full text-[10px] font-bold">Lv.{state.stats.level} {state.userInfo?.nickname}</span>
                        </header>

                        <main class="flex-1 p-4 overflow-y-auto">
                            {state.currentTab === 'home' && <HomeView state={state} toggleTodo={toggleTodo} />}
                            {state.currentTab === 'planner' && <PlannerView todos={state.todos} addTodo={addTodo} deleteTodo={deleteTodo} toggleTodo={toggleTodo} />}
                            {state.currentTab === 'timer' && <TimerView addMinutes={addMinutes} />}
                            {state.currentTab === 'notes' && <NotesView wrongNotes={state.wrongNotes} addWrongNote={addWrongNote} answerQuiz={answerQuiz} />}
                            {state.currentTab === 'character' && <CharacterView stats={state.stats} avatar={state.avatar} userInfo={state.userInfo} />}
                        </main>

                        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t h-14 flex justify-around items-center z-50 shadow-lg text-gray-400">
                            <button onClick={() => setState(p => ({...p, currentTab: 'home'}))} class={`text-[10px] flex flex-col items-center ${state.currentTab === 'home' ? 'text-emerald-600 font-bold' : ''}`}><span>🏠</span>홈</button>
                            <button onClick={() => setState(p => ({...p, currentTab: 'planner'}))} class={`text-[10px] flex flex-col items-center ${state.currentTab === 'planner' ? 'text-emerald-600 font-bold' : ''}`}><span>📅</span>플래너</button>
                            <button onClick={() => setState(p => ({...p, currentTab: 'timer'}))} class={`text-[10px] flex flex-col items-center ${state.currentTab === 'timer' ? 'text-emerald-600 font-bold' : ''}`}><span>⏱️</span>집중</button>
                            <button onClick={() => setState(p => ({...p, currentTab: 'notes'}))} class={`text-[10px] flex flex-col items-center ${state.currentTab === 'notes' ? 'text-emerald-600 font-bold' : ''}`}><span>📝</span>오답노트</button>
                            <button onClick={() => setState(p => ({...p, currentTab: 'character'}))} class={`text-[10px] flex flex-col items-center ${state.currentTab === 'character' ? 'text-emerald-600 font-bold' : ''}`}><span>🧑</span>캐릭터</button>
                        </nav>

                    </div>
                </div>
            );
        }

        // DOM 마운트 실행
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
